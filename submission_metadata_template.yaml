# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  
  "Two-phase hybrid retrieval-and-rerank architecture. Phase 1 (offline precomputation) builds a BM25 sparse index over all 100K candidate career histories, computes five gating multipliers per candidate (consistency/honeypot, trajectory, behavioral, skill-match, location+notice-period), and locally caches a HuggingFace cross-encoder (ms-marco-MiniLM-L-6-v2) so ranking runs fully offline. Phase 2 (online ranking) extracts weighted keywords from the job description, runs a BM25 sieve narrowing 100K candidates to the top 10,000, applies the gating multipliers as a multiplicative penalty to suppress honeypots and weak-trajectory profiles, narrows further to the top 500, then reranks only that shortlist with the cross-encoder against the JD text. Final score blends 60% cross-encoder relevance, 30% gated BM25 similarity, and 10% raw skill match. This two-stage funnel keeps the expensive semantic model off the full pool, which is what keeps ranking under the compute budget. Gating is the primary defense against trap candidates — implausible profiles are downweighted before reranking rather than relying on the cross-encoder alone. Reasoning text is generated from precomputed per-candidate facts (title, years of experience, retrieval/vector/eval/production signals, explicit gap flags) rather than free-form LLM generation. Ranking runtime is ~30 seconds on CPU; no GPU or external API calls are used during ranking"

